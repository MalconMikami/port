# Port — Production override with Caddy reverse proxy + SSL
#
# Usage:
#   1. Copie .env.example → .env e preencha DOMAIN + JWT_SECRET
#   2. docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  api:
    ports: []

volumes:
  caddy_data:
  caddy_config:
