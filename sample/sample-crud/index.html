<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample CRUD - Port</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
</head>
<body>
  <header>
    <h1>📦 Sample CRUD</h1>
    <div id="user-info"></div>
  </header>

  <main>
    <section id="form-section">
      <h2>Novo Item</h2>
      <form id="item-form">
        <div class="field">
          <label for="name">Nome</label>
          <input type="text" id="name" name="name" required minlength="2" placeholder="Ex: Teclado mecânico">
        </div>
        <div class="field">
          <label for="price">Preço (R$)</label>
          <input type="number" id="price" name="price" step="0.01" min="0" required placeholder="Ex: 299.90">
        </div>
        <button type="submit" id="submit-btn">Criar Item</button>
      </form>
    </section>

    <section id="items-section">
      <h2>Itens</h2>
      <div id="loading">Carregando...</div>
      <ul id="items-list"></ul>
    </section>
  </main>

  <script src="/sdk/port.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
